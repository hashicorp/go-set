version: "2"
linters:
  enable:
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - goconst
    - whitespace
  exclusions:
    rules:
      # Test fixtures naturally repeat string literals; don't flag them.
      - path: _test\.go
        linters:
          - goconst
formatters:
  enable:
    - gofmt
